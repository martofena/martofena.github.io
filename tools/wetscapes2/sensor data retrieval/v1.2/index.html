<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" href="logo.png">
<title>Sensor Data Retrieval App v1.2</title>

<!-- CSV parsing -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<!-- Map integration -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Chart.js core -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<!-- Time adapter for Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0"></script>

<style>
  html, body {
    margin: 0;
    height: 100%;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* --- Top header layout --- */
  #top {
    flex: 0 0 15%;
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    overflow: hidden;
    padding: 10px 0px 10px 0px;
  }

  /* Each column */
   #app-title {
    height: 100%;
    flex: 0 0 20%;  
    display: flex;          /* make it a flex container */
    flex-direction: column; /* stack children vertically */
    align-items: center;    /* horizontal centering */
    justify-content: center; /* vertical centering */
    text-align: center;
  }

  #site {
    height: 100%;
    flex: 0 0 60%;  
    text-align: center;
  }

  #logo {
    height: 100%;
    flex: 0 0 20%;  
    text-align: center;
  }

  /* Images fit their containers */
  #site img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Images fit their containers */
  #logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* App title styling */
  #app-title h1 {
    font-family: 'Arial', sans-serif;
    font-size: 2.5em;
    font-weight: 800;
    color: #004d40; /* optional dark green tone */
    line-height: 1.2;
    margin: 0;
  }

  /* Make it responsive for smaller screens */
  @media (max-width: 800px) {
    #top {
      flex-direction: column;
      align-items: center;
    }

    #logo, #app-title, #site {
      flex: 1 1 100%;
      margin-bottom: 10px;
    }

    #app-title h1 {
      font-size: 2em;
    }
  }

  /* --- Map section --- */

  #map-section {
    width: 100%;
    height: clamp(40%);   /* same visual weight as query-builder */
    min-height: 40%;
  }

  #map {
    width: 100%;
    height: 100%;
  }

  /* --- Query builder section --- */
  #query-builder {
    flex: 0 0 40%;
    display: flex;
    flex-direction: column;
    justify-content: center; /* vertical centering inside the section */
    align-items: center;     /* horizontal centering of the controls */
    padding: 10px 0px 10px 0px;
    width: 100%;
    box-sizing: border-box;
    background-color: #f9f9f9;
    gap: 15px; /* <— adjust this value to increase/decrease vertical space */
  }

  #query-controls {
    display: flex;
    align-items: center;   /* vertical centering of all items, including calendars */
    justify-content: center; /* horizontal centering within section */
    gap: 30px;             /* space between items */
    flex-wrap: wrap;
    width: 100%;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    align-items: center; /* center title and element */
  }

  .control-title {
    margin-bottom: 5px;
    font-weight: bold;
    text-align: center;
  }

  select, input[type="date"], button {
    padding: 6px;
    font-size: 16px;
  }

  /* Dropdown font size */
  select[multiple] {
    width: 360px;
    height: 180px;
    font-size: 16px; /* <-- regulate here */
  }

  /* New rule for flexible “All” graying */
  option.gray-out {
    color: gray;
  }

  /* --- Result section --- */

  #result-section {
    flex: 1 1 auto;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 10px 0px 10px 0px;
  }

  /* Each plot + buttons container */
  .chart-block {
    flex: 0 1 auto;
    height: 50vh;
    width: 95%;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    margin-bottom: 20px;
  }

  /* === Chart Canvas Styling === */
  /* Canvas appearance */
  .chart-block canvas {
    width: 100% !important;   /* ✅ fixed width */
    height: 100% !important; /* ✅ fixed height */
    align-items: center;
  }

  .chart-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-top: 10px;
    margin-bottom: 10px;
  }

  .chart-controls select,
  .chart-controls button {
    padding: 8px 16px;
    font-size: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  .chart-controls button {
    background-color: #1976d2;
    color: white;
    border: none;
    cursor: pointer;
    transition: background 0.2s ease;
  }

  .chart-controls button:hover {
    background-color: #1565c0;
  }

  .chart-btn {
    border: none;
    color: #fff;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 0.85rem;
  }

  .chart-btn.enabled {
    background-color: #2c7be5;
    cursor: pointer;
  }

  .chart-btn.disabled {
    opacity: 0.5; 
    background-color: #1976d2 !important;
    cursor: not-allowed;
  }

  /* === Bottom Button Section === */
  #bottom-buttons {
    flex: 0 0 5%;
    width: 100%;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
    padding: 10px 0px 10px 0px;
    z-index: 1000; /* ensure it floats above charts */
  }

  /* === Save Results Button Style === */
  #saveAllResultsBtn {
    background-color: #2c7be5; 
    color: white;
    border: none; 
    border-radius: 10px; 
    padding: 12px 24px; 
    font-size: 1.1rem; 
    font-weight: 600; 
    cursor: pointer; 
    box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2); 
    transition: all 0.2s ease-in-out; 
  }

  #saveAllResultsBtn:hover {
    background-color: #1a5dc9; 
    transform: scale(1.03); 
  }

  /* Disabled state */
  #saveAllResultsBtn:disabled {
    opacity: 0.5; 
    cursor: not-allowed; 
    transform: none;       /* prevent scale on hover */
    background-color: #2c7be5; /* keep original color */
  }

  #saveAllResultsBtn:not(:disabled):hover {
    background-color: #1976d2 !important; 
  }

</style>
</head>

<body>
  <!-- Top section with three columns: logo, title, banner -->
  <div id="top">
    <div id="app-title">
      <h1>
        <span>Sensor Data</span><br>
        <span>Retrieval App</span>
      </h1>
    </div>
    
    <div id="site">
      <img src="site.png" alt="Foto: Tobias Dahms">
    </div>

    <div id="logo">
      <img src="logo.png" alt="WETSCAPES2.0 Logo">
    </div>
  </div>

  <!-- Map Section -->
  <div id="map-section">
    <div id="map"></div>
  </div>

  <!-- Query Builder -->
  <div id="query-builder">
    <div id="query-controls">

      <!-- Application -->
      <div class="control-group">
        <div class="control-title">Application(s)</div>
        <select id="applicationSelect" multiple></select>
      </div>

      <!-- Site Name -->
      <div class="control-group">
        <div class="control-title">Site Name(s)</div>
        <select id="siteSelect" multiple></select>
      </div>

      <!-- Measurement -->
      <div class="control-group">
        <div class="control-title">Measurement(s)</div>
        <select id="measurementSelect" multiple></select>
      </div>

      <!-- Sensor Name -->
      <div class="control-group">
        <div class="control-title">Sensor Name(s)</div>
        <select id="sensorSelect" multiple></select>
      </div>

      <!-- Time Range -->
      <div class="control-group">
        <div class="control-title">Time Range</div>
        <select id="timeRange">
          <option value="1d">Last 1 day</option>
          <option value="1w">Last 1 week</option>
          <option value="1m">Last 1 month</option>
          <option value="custom">Custom</option>
        </select>
      </div>

      <!-- Custom Time Range -->
      <div id="customRange" style="display:none;">
        <div class="control-group">
          <div class="control-title">Start Date</div>
          <input type="date" id="startDate" />
        </div>

        <div class="control-group">
          <div class="control-title">End Date</div>
          <input type="date" id="endDate" />
        </div>
      </div>

    </div>
    
    <div style="text-align:center; margin-top:15px;border: none;border-radius: 8px;border: 1px solid #ccc;">
      <button id="runQueryBtn">Visualize Results</button>
    </div>

    <!-- Note below the button -->
    <!--
    <div style="text-align:center; margin-top:10px; font-size: 0.9em; color: #555;width:100%;">
      Note: The queries are built for sites, measurements, and mounted sensors, that are currently registered in the <a href="https://sensors.wetscapes.uni-rostock.de:58086/signin" target="_blank">Uni Rostock InfluxDB</a> and 
      <a href="https://sensors.gfz.de/" target="_blank">GFZ Sensor Management System</a>.
    </div>
    -->
  </div>

  <!-- Result Section -->
  <div id="result-section">
  </div>

  <!-- Global save button -->
  <div id="bottom-buttons">
    <button id="saveAllResultsBtn" disabled>💾 Save All Results</button>
  </div>

  <div id="savePlotModal" style="display:none; position:fixed; top:30%; left:35%; width:30%; padding:20px; background:white; border:1px solid #aaa; box-shadow:0 0 10px rgba(0,0,0,0.5); z-index:1000;">
    <label for="plotFileName">File name:</label>
    <input type="text" id="plotFileName" placeholder="Enter file name" style="font-size:16px; padding:4px; width:90%;">
    <br><br>
    <label for="plotFileFormat">Format:</label>
    <select id="plotFileFormat">
      <option value="png">PNG</option>
      <option value="jpeg">JPEG</option>
    </select>
    <br><br>
    <button id="savePlotConfirm">Save</button>
    <button id="savePlotCancel">Cancel</button>
  </div>

  <!-- Bottom contact -->
  <div style="text-align:center;flex: 0 0 5%;width:100%;">
      Contact: martin.aleksandrov@uni-rostock.de
  </div>

<script>

/* LOADING THE FILE AND CASCADING BEHAVIOR IN THE QUERY-BUILDER SECTION */

const csvFile = 'configuration_metadata.csv'; // must be in same folder as HTML
let csvData = [];

let map;
let mapMarkers = [];
let activeMarkers = [];
let inactiveMarkers = [];
let spiderLines = [];

document.addEventListener('DOMContentLoaded', () => {

  const applicationSelect = document.getElementById('applicationSelect');
  const siteSelect = document.getElementById('siteSelect');
  const measSelect = document.getElementById('measurementSelect');
  const sensSelect = document.getElementById('sensorSelect');
  const timeRangeSelect = document.getElementById('timeRange');

  // Initially disable siteSelect because no Application selected yet
  siteSelect.innerHTML = '';
  siteSelect.disabled = true;

  // Start with empty measurement & sensor dropdowns and disabled
  measSelect.innerHTML = '';
  measSelect.disabled = true;
  sensSelect.innerHTML = '';
  sensSelect.disabled = true;  
  timeRangeSelect.disabled = true;     

  // load curated_metadata.csv
  loadCSVandMAP(); 

  addOptionsWithAllBehavior(applicationSelect, [
    'All',
    'Licors',
    'Mesocosms',
    'Peatsens',
    'Wetscapes'
  ]);
  // Application select change event
  applicationSelect.addEventListener('change', () => {

    const appVals = getSelectValues(applicationSelect);

    // Clear and disable dependent dropdowns
    siteSelect.innerHTML = '';
    siteSelect.disabled = false;
    measSelect.innerHTML = '';
    measSelect.disabled = false;
    sensSelect.innerHTML = '';
    sensSelect.disabled = false;  
    timeRangeSelect.disabled = false; 

    if (appVals.length === 0) {
      clearMapMarkers();
      return;
    }

    // Populate Site select with filtered sites from csvData
    updateSiteSelect(appVals);
    updateMap();
  });

  // Cascading dropdown behavior
  siteSelect.addEventListener('change', () => {
    updateMap();
    // Clear measurement and sensor options when site changes
    measSelect.innerHTML = '';
    sensSelect.innerHTML = '';
    updateMeasurementSelect();
  });

  measSelect.addEventListener('change', () => {
    updateSensorSelect();
  });

  sensSelect.addEventListener('change', () => {
      updateMap();
  })

  // Initialize default date range
  initializeTimeRangeOptions();
  if (timeRangeSelect) {
    timeRangeSelect.value = '1m';
    applyPreset({ months: 1 });
  }
  // Set up min and max date values
  setupDates(); 

  const resultSection = document.getElementById('result-section');

  if (resultSection) {
    let resizeTimeout;

    const observer = new MutationObserver(() => {
      clearTimeout(resizeTimeout);

      resizeTimeout = setTimeout(() => {
        if (map && map._container.offsetHeight > 0) {
          map.invalidateSize(true);
        }
      }, 150); // wait for layout to settle
    });

    observer.observe(resultSection, {
      childList: true,
      subtree: true
    });
  }

  // Run Query button behaviour
  const btnRunQuery = document.getElementById('runQueryBtn');
  btnRunQuery.addEventListener('click', () => {
    handleRunQuery();
    requestAnimationFrame(() => {
      if (map) map.invalidateSize(true);
    });

  });

  const saveAllBtn = document.getElementById('saveAllResultsBtn');
  saveAllBtn.disabled = true;  // ensure initial state

  // Load once on page start
  loadSensorColors();
});

// Load the CSV file
function loadCSVandMAP() {
  fetch(csvFile)
    .then(resp => {
      if (!resp.ok) throw new Error(`HTTP error! status: ${resp.status}`);
      return resp.text();
    })
    .then(text => {
      const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
      csvData = parsed.data;

      console.log("CSV loaded:", csvData);  
      initializeMap([]);
    })
    .catch(err => {
      console.error("Failed to load CSV:", err);
      alert("Error loading metadata CSV. See console.");
    });
}

function initializeMap(rows) {
  if (!map) {
    map = L.map('map').setView([54.0, 13.0], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);
  }

  clearMapMarkers();
  
  let activeConfigCount = 0;
  let inactiveConfigCount = 0;

  if (!rows || rows.length === 0) return;

  const bounds = [];

  /**
   * STEP 1:
   * Group by site + exact coordinates
   */
  const locationGroups = {};

  rows.forEach(row => {
    const site = (row['Site Name'] || '').trim();;
    const cfg  = (row['Configuration Name'] || '').trim();
    const lats = row['Latitude'].split(';').map(s => s.trim());
    const lons = row['Longitude'].split(';').map(s => s.trim());
    const lat  = parseFloat(lats[lats.length-1]);
    const lon  = parseFloat(lons[lons.length-1]);

    if (!site || !cfg || isNaN(lat) || isNaN(lon)) return;

    const key = `${site}_${lat.toFixed(10)}_${lon.toFixed(10)}`;

    if (!locationGroups[key]) {
      locationGroups[key] = {
        site,
        lat,
        lon,
        configurations: {}
      };
    }

    if (!locationGroups[key].configurations[cfg]) {
      locationGroups[key].configurations[cfg] = {
        configurationName: cfg,
        mountDate: row['Mount Date(s)'],
        unmountDate: row['Unmount Date(s)'],
        parameters: new Set(),
        sensors: new Set(),
        measurements: new Set()
      };
    }

    // ---- Parameters (; separated) --
    if (row['Parameter']) {
      const params = row['Parameter'].split(';').map(s => s.trim());
      const values = (row['Parameter Value'] || '').split(';').map(s => s.trim());
      const units  = (row['Parameter Unit'] || '').split(';').map(s => s.trim());

      params.forEach((p, i) => {
        const entry = `${p}: ${values[i] || ''} ${units[i] || ''}`.trim();
        locationGroups[key].configurations[cfg].parameters.add(entry);
      });
    }

    // ---- Sensors --
    if (row['Sensor Name']) {
      locationGroups[key].configurations[cfg].sensors.add(
        `${row['Sensor Name']}: mfr (${row['Manufacturer Name'] || ''}); model (${row['Sensor Model'] || ''}); sn (${row['Serial Number'] || ''}); ttn name(s) (${row['InfluxDB Sensor Name(s)'] || ''})`
      );
    }

    // -- Measurements --
    if(row['Measurement']){
      locationGroups[key].configurations[cfg].measurements.add(
        `${smsToMeasurementMap[row['Measurement']]}: min (${measurementLimits[smsToMeasurementMap[row['Measurement']]].min ?? ''}); 
        max (${measurementLimits[smsToMeasurementMap[row['Measurement']]].max ?? ''}): unit (${measurementUnits[smsToMeasurementMap[row['Measurement']]] || ''})`
      );
    }
  });

  /**
   * STEP 2:
   * Create ONE marker PER configuration
   * Apply jitter only if multiple configs share same coordinates
   */
  Object.values(locationGroups).forEach(group => {
    const configs = Object.values(group.configurations);
    const total = configs.length;

    configs.forEach((config, idx) => {
      let lat = group.lat;
      let lon = group.lon;
      let jlat = lat;
      let jlon = lon;

      if (total > 1) {
        [jlat, jlon] = jitterLatLng(lat, lon, idx, total);
      }

      const mounts = config.mountDate.split(';').map(s => s.trim()).filter(s => s !== '' &&  s.toLowerCase() !== 'na' && s.toLowerCase() !== 'n/a');
      const unmounts = config.unmountDate.split(';').map(s => s.trim()).filter(s => s !== '' &&  s.toLowerCase() !== 'na' && s.toLowerCase() !== 'n/a');

      let isActive;
      if(mounts.length>unmounts.length) {
        isActive = true;
      }
      else {
        isActive = false;
      }

      if (isActive) {
        activeConfigCount++;
      } else {
        inactiveConfigCount++;
      }
      const markerColor = isActive ? 'blue' : 'red';

      const marker = L.circleMarker([jlat, jlon], {
        radius: 8,
        color: markerColor,
        fillColor: markerColor,
        fillOpacity: 0.5,
        weight: 1
      }).addTo(map);

      if (isActive) {
        activeMarkers.push(marker);
      } else {
        inactiveMarkers.push(marker);
      }

      // ---- Spider line (true location → marker)
      const line = L.polyline(
        [[lat, lon], [jlat, jlon]],
        {
          color: markerColor,
          weight: 1,
          opacity: 1,
          dashArray: '1'
        }
      ).addTo(map);

      spiderLines.push(line);

      const popupContent = `
        <div style="max-height:200px; overflow-y:auto; font-size:13px;">
          <b>Site:</b> ${group.site}<br>
          <b>Configuration:</b> ${config.configurationName}<br>
          <b>Status:</b> ${isActive ? 'Active' : 'Inactive'}<br>
          <b>Start:</b> ${mounts[mounts.length-1] || 'N/A'}<br>
          <b>End:</b> ${unmounts[mounts.length-1] || 'Open End'}<br>
          <b>Parameters:</b><br>
          ${config.parameters.size ? [...config.parameters].join('<br>') : 'N/A'}<br>
          <b>Devices:</b><br>
          ${config.sensors.size ? [...config.sensors].join('<br>') : 'N/A'}<br>
          <b>Measured Quantities:</b><br>
          ${config.measurements.size ? [...config.measurements].join('<br>') : 'N/A'}
        </div>
      `;

      marker.bindPopup(popupContent, { autoPan: false });

      mapMarkers.push(marker);
      bounds.push([jlat, jlon]);
    });
  });

  addMapLegend(map, activeConfigCount, inactiveConfigCount);
  setLegendActive('legend-all');

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [40, 40] });
  }
}

function extractWs2(value) {
  if (!value) return null;

  return value
    .split(';')
    .map(v => v.trim())
    .find(v => v.toLowerCase().startsWith('ws2')) || null;
}

function jitterLatLng(lat, lon, index, total, radiusMeters = 5) {
  const metersToDegLat = 1 / 111111;
  const metersToDegLon = 1 / (111111 * Math.cos(lat * Math.PI / 180));

  const angle = (2 * Math.PI * index) / total;

  return [
    lat + Math.sin(angle) * radiusMeters * metersToDegLat,
    lon + Math.cos(angle) * radiusMeters * metersToDegLon
  ];
}

function addMapLegend(map, activeCount = 0, inactiveCount = 0) {
  if (map._legend) {
    map.removeControl(map._legend);
  }

  const legend = L.control({ position: 'bottomright' });

  legend.onAdd = function () {
    const div = L.DomUtil.create('div', 'map-legend');
    div.style.background = 'white';
    div.style.padding = '8px';
    div.style.borderRadius = '4px';
    div.style.fontSize = '13px';
    div.style.boxShadow = '0 0 5px rgba(0,0,0,0.3)';
    div.style.cursor = 'pointer';

    div.innerHTML = `
      <b>Legend</b><br>
      <div id="legend-active">
        <span style="color:blue;">●</span> Active Configurations (${activeCount})
      </div>
      <div id="legend-inactive">
        <span style="color:red;">●</span> Inactive Configurations (${inactiveCount})
      </div>
      <div id="legend-all" style="margin-top:4px; font-size:12px;">
        <span style="color:black;">●</span> All Configurations (${activeCount+inactiveCount})
      </div>
    `;

    // Prevent map drag when clicking legend
    L.DomEvent.disableClickPropagation(div);

    return div;
  };

  legend.addTo(map);
  map._legend = legend;

  // ---- Click handlers (AFTER legend is added)
  setTimeout(() => {
    document.getElementById('legend-active')?.addEventListener('click', () => {
      showOnlyActive();
      setLegendActive('legend-active');
    });
    document.getElementById('legend-inactive')?.addEventListener('click', () => {
      showOnlyInactive();
      setLegendActive('legend-inactive');
    });
    document.getElementById('legend-all')?.addEventListener('click', () => {
      showAllMarkers();
      setLegendActive('legend-all');
    });
  }, 0);
}

function setLegendActive(id) {
  ['legend-active', 'legend-inactive', 'legend-all'].forEach(k => {
    const el = document.getElementById(k);
    if (!el) return;
    el.style.fontWeight = (k === id) ? 'bold' : 'normal';
    el.style.background = (k === id) ? '#eef3ff' : 'transparent';
    el.style.borderRadius = '4px';
    el.style.padding = '2px 4px';
  });
}

function showOnlyActive() {
  inactiveMarkers.forEach(m => map.removeLayer(m));
  activeMarkers.forEach(m => m.addTo(map));
  spiderLines.forEach(l => l.addTo(map));
}

function showOnlyInactive() {
  activeMarkers.forEach(m => map.removeLayer(m));
  inactiveMarkers.forEach(m => m.addTo(map));  
  spiderLines.forEach(l => l.addTo(map));
}

function showAllMarkers() {
  [...activeMarkers, ...inactiveMarkers].forEach(m => m.addTo(map));
  spiderLines.forEach(l => l.addTo(map));
}

function clearMapMarkers() {
  if (!mapMarkers) return; // safety check
  if (!spiderLines) return;

  mapMarkers.forEach(marker => {
    map.removeLayer(marker);
  });
  spiderLines.forEach(l => map.removeLayer(l));

  mapMarkers = [];

function normalizeApp(val) {
  return (val || '')
    .replace(/^\uFEFF/, '')   // remove UTF-8 BOM
    .replace(/\s+/g, ' ')     // collapse whitespace
    .trim()
    .toLowerCase();
}

// Get unique values from a CSV column
function uniqueValues(data, column) {
  const values = data.map(row => row[column]).filter(v => v && v.trim() !== '' && v.toLowerCase() !== 'na');
  return [...new Set(values)];
}

// Generic addOptions function "All" selection behavior
function addOptionsWithAllBehavior(select, options) {
  const allIndex = options.indexOf('All');
  let sorted = options.filter(v => v !== 'All').sort((a,b) => a.localeCompare(b));
  if (allIndex !== -1) sorted.unshift('All');

  select.innerHTML = '';
  for (const val of sorted) {
    const opt = document.createElement('option');
    opt.value = opt.textContent = val;
    select.appendChild(opt);
  }

  // Add change listener
  select.addEventListener('change', () => handleAllExclusive(select));
}

// Handle "All" selection behavior
function handleAllExclusive(select) {
  const selectedValues = Array.from(select.selectedOptions).map(o => o.value);
  const allSelected = selectedValues.includes('All');

  if (allSelected) {
    // Only All logic: deselect all others, gray them
    for (const opt of select.options) {
      if (opt.value !== 'All') {
        opt.selected = false;
        opt.classList.add('gray-out');
      } else {
        opt.classList.remove('gray-out');
        opt.selected = true;
      }
    }
  } else {
    // User selected other values; deselect "All" if it was selected
    const allOption = select.querySelector('option[value="All"]');
    if (allOption.selected) allOption.selected = false;

    // Remove gray class from all options
    for (const opt of select.options) {
      opt.classList.remove('gray-out');
    }
  }
}

// Get selected values, respecting "All" option
function getSelectValues(selectElement) {
  const selected = Array.from(selectElement.selectedOptions).map(opt => opt.value);
  // If "All" is selected, return all options except "All"
  if (selected.includes("All")) {
    return Array.from(selectElement.options)
                .map(opt => opt.value)
                .filter(v => v !== "All");
  }
  return selected;
}

function initializeTimeRangeOptions() {
    // --- Time range preset handling ---
  const timeRangeSelect = document.getElementById('timeRange');
  const customRange = document.getElementById('customRange');

  if (timeRangeSelect) {
    timeRangeSelect.addEventListener('change', e => {
      const val = e.target.value;

      if (val === 'custom') {
        customRange.style.display = 'block';
        const now = new Date();
        document.getElementById('startDate').value = toISODate(now);
        document.getElementById('endDate').value   = toISODate(now);
        return;
      }

      customRange.style.display = 'none';

      if (val === '1d') applyPreset({ days: 1 });
      if (val === '1w') applyPreset({ days: 7 });
      if (val === '1m') applyPreset({ months: 1 });
    });
  }
}

function applyPreset({ days = null, months = null }) {
  const now = new Date();
  let start = new Date(now);

  if (days !== null) start.setDate(start.getDate() - days);
  if (months !== null) start.setMonth(start.getMonth() - months);

  document.getElementById('startDate').value = toISODate(start);
  document.getElementById('endDate').value   = toISODate(now);
}

function toISODate(d) {
  return d.toISOString().split('T')[0];
}

function setupDates() {
  const start = document.getElementById('startDate');
  const end = document.getElementById('endDate');

  if (!start || !end) return;

  const today = new Date().toISOString().split('T')[0];

  start.min = '2025-04-01';
  start.max = today;

  end.min = '2025-04-01';
  end.max = today;

  start.addEventListener('change', () => {
    if (start.value) {
      end.min = start.value;
    }
  });
}

// --- Global color cache ---
const sensorColorMap = {};

function getColorForSensor(sensorId) {
  if (sensorColorMap[sensorId]) {
    return sensorColorMap[sensorId];
  }

  // Generate color from hash of sensor name
  let hash = 0;
  for (let i = 0; i < sensorId.length; i++) {
    hash = sensorId.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360; // Hue in HSL color space
  const color = `hsl(${hue}, 70%, 50%)`;

  sensorColorMap[sensorId] = color;
  return color;
}

function saveSensorColors() {
  localStorage.setItem('sensorColorMap', JSON.stringify(sensorColorMap));
}

function loadSensorColors() {
  const stored = localStorage.getItem('sensorColorMap');
  if (stored) Object.assign(sensorColorMap, JSON.parse(stored));
}

            'Accept': 'application/csv'
          },
          body: fluxQuery3Org
        })
      ]);
      // Only fail if BOTH failed
      if (!queryResponse1.ok && !queryResponse2.ok && !queryResponse3.ok) {
        const err1 = await queryResponse1.text();
        const err2 = await queryResponse2.text();
        const err3 = await queryResponse3.text();
        throw new Error(
          `All Influx queries failed:\nQ1: ${queryResponse1.status} ${err1}\nQ2: ${queryResponse2.status} ${err2}\nQ3: ${queryResponse3.status} ${err3}`
        );
      }

      // Read text only for successful ones
      const csvParts = [];

      if (queryResponse1.ok) {
        const t1 = await queryResponse1.text();
        if (t1 && t1.trim() !== '') csvParts.push(t1);
      }

      if (queryResponse2.ok) {
        const t2 = await queryResponse2.text();
        if (t2 && t2.trim() !== '') csvParts.push(t2);
      }

      if (queryResponse3.ok) {
        const t3 = await queryResponse3.text();
        if (t3 && t3.trim() !== '') csvParts.push(t3);
      }

      csvText = combineInfluxCSVs(...csvParts);
      console.log(`Flux query result for "${measurementUI}":\n`, csvText);

    } catch (err) {
      alert("Error querying InfluxDB: " + err.message);
      continue;
    }
    // --- Parse the CSV
    let influxData = [];

    try {
      influxData = parseInfluxCSV(csvText, measurementToInfluxFieldMap[measurementUI]);
      //alert(JSON.stringify(influxData));
      if(measurementUI === "KELLER Groundwater level" || measurementUI === "Dragino Groundwater level") {
        influxData = correctGroundwaterlevel(influxData);
      }
      if(measurementUI === "Stevens Soil moisture" || measurementUI === "LI-COR Soil moisture") {
        influxData = correctSoilMoisture(influxData);
      }      
      if(measurementUI === "Stevens Soil conductivity" || measurementUI === "LI-COR Soil conductivity") {
        influxData = correctSoilConductivity(influxData);
      }
      if(measurementUI === "Remaining battery") {
        influxData = correctRemainingBattery(influxData);
      }
      //alert(JSON.stringify(influxData));
      if (JSON.stringify(influxData) === "[]") {
        alert(`WARNING: There is no results for '${measurementUI}'. We are keen on looking into this issue. For this reason, please share the selected site name(s), measurement(s), and sensor name(s), as well as the selected date range, with us at 'martin.aleksandrov@uni-rostock.de'.`);
        continue;
      }

    } catch (err) {
      alert("Error parsing Influx data: " + err.message);
      continue;
    }

    if (influxData && influxData.length > 0) {
      allQueriedData.push(...influxData);
      //alert(JSON.stringify(allQueriedData));
      const enrichedRows = influxData.map(row => ({
        ...row,
        measurementUI   // attach explicit measurement label
      }));

      allExportRows.push(...enrichedRows);
      allSensorsForExport.push(...selectedMeasurementSensors);
      allTTNsForExport.push(...selectedTTNnames);
      
      const resultSection = document.getElementById('result-section');

      // Create chart container
      const chartBlock = document.createElement('div');
      chartBlock.className = 'chart-block';

      // Chart canvas
      const canvas = document.createElement('canvas');
      canvas.classList.add('chart-canvas'); // 👈 use a shared CSS class
      chartBlock.appendChild(canvas);

      const chart = plotResultsFromInflux(influxData, measurementUI, selectedMeasurementSensors, selectedTTNnames, canvas);
      requestAnimationFrame(() => {
        autoResizeChartForLegend(chart, chartBlock);
      });

      // Controls section
      const controlsDiv = document.createElement('div');
      controlsDiv.className = 'chart-controls';

      const detectBtn = document.createElement('button');
      detectBtn.textContent = 'Detect Out-of-Range Values';
      detectBtn.className = 'chart-btn disabled';
      detectBtn.disabled = true;
      const range = measurementLimits[measurementUI];
      if (!range) {
        alert(`No manufacturer range defined for ${measurementUI}`);
        return;
      }
      let outOfRangeDetected = false;
      chart.data.datasets.forEach(ds => {
        ds.data.forEach((point, idx) => {
          const value = typeof point === 'object' ? point.y : point;

          if (value < range.min || value > range.max) {
            outOfRangeDetected = true;
          }
        });
      });
      if(outOfRangeDetected) {
        enableButton(detectBtn);
        detectBtn.disabled = false;
      }

      const removeBtn = document.createElement('button');
      removeBtn.textContent = 'Remove Out-of-Range Values';
      removeBtn.className = 'chart-btn disabled';
      removeBtn.disabled = true;

      // Dropdown for format
      const formatSelect = document.createElement('select');
      formatSelect.innerHTML = `
        <option value="png">PNG</option>
        <option value="jpeg">JPEG</option>
      `;

      // "Save Plot" button
      const savePlotBtn = document.createElement('button');
      savePlotBtn.textContent = 'Save Image';

      // "Save CSV" button
      const saveCsvBtn = document.createElement('button');
      saveCsvBtn.textContent = 'Save CSV';

      controlsDiv.appendChild(detectBtn);
      controlsDiv.appendChild(removeBtn);
      controlsDiv.appendChild(formatSelect);
      controlsDiv.appendChild(savePlotBtn);
      controlsDiv.appendChild(saveCsvBtn);
      chartBlock.appendChild(controlsDiv);

      // Append to results section
      resultSection.appendChild(chartBlock);

      detectBtn.addEventListener('click', () => {
        if (!outOfRangeDetected) return;

        const range = measurementLimits[measurementUI];
        if (!range) {
          alert(`No manufacturer range defined for ${measurementUI}`);
          return;
        }

        chart.data.datasets.forEach(ds => {
          ds._outOfRangeIndices = [];

          ds.data.forEach((point, idx) => {
            const value = typeof point === 'object' ? point.y : point;

            if (value < range.min || value > range.max) {
              ds._outOfRangeIndices.push(idx);
            }
          });

          if (ds._outOfRangeIndices.length > 0) {
            // Highlight points
            ds.pointRadius = ds.data.map((_, i) =>
              ds._outOfRangeIndices.includes(i) ? 6 : 0
            );

            ds.pointBackgroundColor = ds.data.map((_, i) =>
              ds._outOfRangeIndices.includes(i)
                ? darkenColor(ds.borderColor, 0.35)
                : ds.borderColor
            );
            ds.pointBorderWidth = ds.data.map((_, i) =>
              ds._outOfRangeIndices.includes(i) ? 2 : 0
            );

          }
        });

        chart.update();
        outOfRangeDetected = false;
        enableButton(removeBtn);
      });

      let outOfRangeRemoved = false;
      removeBtn.addEventListener('click', () => {
        if (outOfRangeRemoved) return;

        chart.data.datasets.forEach(ds => {
          if (!ds._outOfRangeIndices || ds._outOfRangeIndices.length === 0) return;

          ds.data = ds.data.filter((_, i) =>
            !ds._outOfRangeIndices.includes(i)
          );

          delete ds._outOfRangeIndices;

          // Reset styling
          ds.pointRadius = 0;
          ds.pointHoverRadius = 0;
          ds.pointBorderWidth = 0;
          ds.pointHoverBorderWidth = 0;
        });
        // Update legend statistics
        chart.data.datasets.forEach(ds => {
          const sensorName = ds.label.split(' (')[0]; // extract name
          ds.label = buildDatasetLabel(sensorName, ds.data);
        });
        // Update trends
        chart.update();
        outOfRangeRemoved = true;
        // 🔒 FINAL STATE
        disableButton(detectBtn);
        disableButton(removeBtn);
      });

      savePlotBtn.addEventListener('click', () => {
        const format = formatSelect.value;
        saveSinglePlot(canvas, measurementUI, format, startDate, endDate);
      });

      saveCsvBtn.addEventListener('click', () => {
        savePlotCSV(enrichedRows, measurementUI, selectedMeasurementSensors, selectedTTNnames, startDate, endDate);
      });

    }
  }

  const saveAllBtn = document.getElementById('saveAllResultsBtn');

  if (allQueriedData.length > 0) {
    saveAllBtn.disabled = false;

    saveAllBtn.onclick = () => {
      saveAllResults(allExportRows, allSensorsForExport, allTTNsForExport, startDate, endDate);
    };

  } else {
    saveAllBtn.disabled = true;
    saveAllBtn.onclick = null;
  }

}

function combineInfluxCSVs(...csvTexts) {
  const headerLines = [];
  const dataLines = [];
  let headerCaptured = false;

  for (const csvText of csvTexts) {
    if (!csvText || typeof csvText !== 'string') continue;

    const lines = csvText
      .split('\n')
      .map(l => l.trim())
      .filter(Boolean);

    for (const line of lines) {
      // Header metadata
      if (line.startsWith('#')) {
        if (!headerCaptured) {
          headerLines.push(line);
        }
        continue;
      }

      // Column header
      if (line.startsWith('_time,')) {
        if (!headerCaptured) {
          headerLines.push(line);
          headerCaptured = true;
        }
        continue;
      }

      // Data row
      dataLines.push(line);
    }
  }

  return [...headerLines, ...dataLines].join('\n');
}


function parseInfluxCSV(csvText, fields) {
  const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
  const rows = parsed.data;
  if (!rows || rows.length === 0) return [];

  const data = [];

  // Detect all columns that are actual TTN devices
  // These are usually everything *after* "_time"
  const headerKeys = Object.keys(rows[0]);
  const fieldIndex = headerKeys.indexOf('_time');
  const deviceColumns = fieldIndex >= 0 ? headerKeys.slice(fieldIndex + 1) : [];

  for (const row of rows) {
    const time = row['_time'];
    if (!time) continue;

    for (const device of deviceColumns) {
      const value = row[device];
      if (value !== undefined && value !== "") {
        data.push({
          _time: time,
          _measurement: device,  // device TTN name
          _field: fields[0],
          _value: parseFloat(value)
        });
      }
    }
  }

  return data;
}

function correctGroundwaterlevel(influxData) {
  // --- Pre-build TTN → parameter lookup for speed ---
  const ttnParamMap = {};

  csvData.forEach(row => {
    const paramStr = row['Parameter Value'];
    const ttnStr = row['InfluxDB Sensor Name(s)'];

    if (!paramStr || !ttnStr) return influxData;

    const values = paramStr
      .split(';')
      .map(v => parseFloat(v))
      .filter(v => !isNaN(v));

    if (values.length < 2) return influxData;

    const cableLength = Math.max(...values);
    const pipeHeight = Math.min(...values);

    ttnStr.split(';').forEach(ttn => {
      ttnParamMap[ttn.trim()] = { cableLength, pipeHeight };
    });
  });

  // --- Apply correction ---
  return influxData.map(row => {
    const params = ttnParamMap[row._measurement];
    
    let correctedValue = row._value;
    const meas = row._measurement?.trim().toLowerCase();

    // Mesocosm sensors
    if (meas?.startsWith('ws2-waterl')) {
      correctedValue = row._value/10;
    } 
    
    // KELLER sensors
    if (meas?.startsWith('ws2-sdi')) {
      correctedValue =
        100*row._value*10.19716212978 - 
        params.cableLength +
        params.pipeHeight;
    }

    return {
      ...row,
      _value: correctedValue
    };
  });
}

function correctSoilMoisture(influxData) {

  return influxData.map(row => {

    let correctedValue = row._value;
    const meas = row._measurement?.trim().toLowerCase();

    // LI-COR sensors: fraction → %
    if (meas?.startsWith('ioe')) {
      correctedValue = 100 * row._value;
    } 
    // WS2 sensors: dielectric permittivity → volumetric water content (%) [Topp et al. 1980]
    if (meas?.startsWith('ws2-sdi')) {
      /*correctedValue =
        100 * (
          -0.053 +
          0.0292 * row._value -
          0.00055 * Math.pow(row._value, 2) +
          0.0000043 * Math.pow(row._value, 3)
        );
      */  
      correctedValue = row._value;
    }

    return {
      ...row,
      _value: correctedValue
    };
  });
}

function correctSoilConductivity(influxData) {

  return influxData.map(row => {

    let correctedValue = row._value;
    const meas = row._measurement?.trim().toLowerCase();

    // LI-COR sensors: fraction → %
    if (meas?.startsWith('ioe')) {
      correctedValue = 10000 * row._value;
    } 
    // WS2 sensors: dielectric permittivity → volumetric water content (%) [Topp et al. 1980]
    if (meas?.startsWith('ws2-sdi')) {
      correctedValue = row._value;
    }

    return {
      ...row,
      _value: correctedValue
    };
  });
}

function correctRemainingBattery(influxData) {

  return influxData.map(row => {

    let correctedValue = row._value;
    const meas = row._measurement?.trim().toLowerCase();

    // LI-COR sensors: fraction → %
    if (meas?.startsWith('ioe')) {
      correctedValue = 100 * (row._value/20);
    } 
    // All other sensors
    else {
      correctedValue = row._value;
    }

    return {
      ...row,
      _value: correctedValue
    };
  });
}

/* PLOTTING THE RESULTS IN THE RESULT SECTION */

function plotResultsFromInflux(data, measurement, sensors, ttns, canvas) {

  if (!canvas) {
    console.error("Canvas element not found.");
    return;
  }

  const ctx = canvas.getContext('2d');
  if (!ctx) {
    console.error("Failed to get canvas 2D context.");
    return;
  }

  // Destroy old chart (if it exists)
  if (canvas.chartInstance) {
    canvas.chartInstance.destroy();
  }

  const selectedSensors = sensors.map((sensorName, i) => ({
    sensor: sensorName,
    ttn: ttns[i] || null
  }));

  // --- Map TTN name → Sensor name ---
  const ttnToSensors = {};

  selectedSensors.forEach(({sensor, ttn}) => {

    if (!ttnToSensors[ttn]) {
      ttnToSensors[ttn] = [];
    }

    ttnToSensors[ttn].push(sensor);

  });

  // --- Group data by TTN name ---
  const sensorGroups = {};

  data.forEach(row => {

    const ttn = row['_measurement'];
    const time = new Date(row['_time']);
    const value = parseFloat(row['_value']);

    if (isNaN(value) || !ttn) return;

    const sensorsForTTN = ttnToSensors[ttn] || [ttn];

    sensorsForTTN.forEach(sensorName => {

      if (!sensorGroups[sensorName]) {
        sensorGroups[sensorName] = [];
      }

      sensorGroups[sensorName].push({
        x: time,
        y: value,
        measurement
      });

    });

  });

  // --- Sort sensor groups according to the order of selected sensors ---
  const orderedSensorGroups = Object.entries(sensorGroups).sort(
    ([sensorA], [sensorB]) => {
      const idxA = sensors.indexOf(sensorA);
      const idxB = sensors.indexOf(sensorB);

      if (idxA === -1 && idxB === -1) return sensorA.localeCompare(sensorB);
      if (idxA === -1) return 1;
      if (idxB === -1) return -1;

      return idxA - idxB;
    }
  );

  // --- Deterministic colors ---
  let datasets = orderedSensorGroups.map(([sensorName, points]) => ({
    label: buildDatasetLabel(sensorName, points),
    data: points,
    borderColor: getColorForSensor(sensorName),
    backgroundColor: 'rgba(255,255,255,0)',
    borderWidth: 2,
    tension: 0.2,
    pointRadius: 0
  }));

  if (datasets.length === 0) {
    alert("No valid data points found to plot.");
    return;
  }

  // --- Y-axis label mapping
  const unitLabels = measurementUnits;
  const unitLabel = unitLabels[measurement] || measurement;

  // --- Build the Chart
  const chart = new Chart(ctx, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      parsing: { xAxisKey: 'x', yAxisKey: 'y' },
      scales: {
        x: {
          type: 'time',
          time: {
            tooltipFormat: 'll HH:mm',
            displayFormats: { hour: 'MMM d, HH:mm' }
          },
          title: { display: true, text: 'Time' },
          grid: { color: '#ddd' }
        },
        y: {
          title: { display: true, text: unitLabel },
          grid: { color: '#ddd' }
        }
      },
      plugins: {
        legend: { 
          display: true, 
          position: 'top',
          labels: {
            boxWidth: 25,
            font: { size: 14 },
            color: '#222'
          } 
        },
        title: {
          display: true,
          text: `${measurement} (Manifacturer Min Value: ${measurementLimits[measurement].min} ${measurementUnits[measurement]}, Manifacturer Max Value ${measurementLimits[measurement].max} ${measurementUnits[measurement]})`,
          font: { size: 18, weight: 'bold' },
          color: '#222'
        },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(2)}`
          }
        },
        // Ensure white background under exported canvas
        background: {
          color: '#ffffff'
        }
      }
    }
  });
  // ✅ Save reference so it can be destroyed on refresh
  canvas.chartInstance = chart;
  saveSensorColors();
  return canvas.chartInstance;
}

function autoResizeChartForLegend(chart, chartBlock) {
  if (!chart || !chart.legend) return;

  const basePlotHeight = 350;     // main plotting area
  const legendHeight = 15*chart.data.datasets.length || 0;
  const padding = 20;

  const totalHeight = basePlotHeight + legendHeight + padding;

  chartBlock.style.height = `${totalHeight}px`;
  chartBlock.style.minHeight = `${totalHeight}px`;

  chart.resize();
}

// --- Helper to compute summary stats ---
function computeStats(values) {
  if (!values || values.length === 0) return { min: NaN, max: NaN, mean: NaN, std: NaN };
  const min = Math.min(...values);
  const max = Math.max(...values);
  const mean = values.reduce((a, b) => a + b, 0) / values.length;
  const variance = values.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / values.length;
  const std = Math.sqrt(variance);
  return { min, max, mean, std };
}

function buildDatasetLabel(sensorName, points) {
  const values = points.map(p => p.y);
  const stats = computeStats(values);

  return `${sensorName} ` +
    `(Min: ${stats.min.toFixed(2)}, ` +
    `Max: ${stats.max.toFixed(2)}, ` +
    `Mean: ${stats.mean.toFixed(2)}, ` +
    `StdDev: ${stats.std.toFixed(2)})`;
}

function darkenColor(color, factor = 0.5) {
  const match = color.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
  if (!match) return color;

  let [_, r, g, b, a] = match;
  r = Math.max(0, Math.floor(r * factor));
  g = Math.max(0, Math.floor(g * factor));
  b = Math.max(0, Math.floor(b * factor));
  a = a !== undefined ? a : 1;

  return `rgba(${r}, ${g}, ${b}, ${a})`;
}

function enableButton(btn) {
  btn.disabled = false;
  btn.classList.remove('disabled');
  btn.classList.add('enabled');
}

function disableButton(btn) {
  btn.disabled = true;
  btn.classList.remove('enabled');
  btn.classList.add('disabled');
}

// Save one plot (with format choice)
function saveSinglePlot(canvas, measurement, format, startDate, endDate) {
  const exportCanvas = getCanvasWithWhiteBG(canvas);
  const filename = makeFileName(measurement, startDate, endDate);
  const link = document.createElement('a');
  link.download = `${filename}.${format}`;
  link.href = exportCanvas.toDataURL(`image/${format}`);
  link.click();
}

// --- Helper to draw white background ---
function getCanvasWithWhiteBG(originalCanvas) {
  const newCanvas = document.createElement('canvas');
  const ctx = newCanvas.getContext('2d');
  newCanvas.width = originalCanvas.width;
  newCanvas.height = originalCanvas.height;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, newCanvas.width, newCanvas.height);
  ctx.drawImage(originalCanvas, 0, 0);
  return newCanvas;
}

// --- Helper to prepare the filename ---
function makeFileName(baseName, startDate, endDate) {
  const safeBase = baseName.replace(/\s+/g, '_');
  return `${safeBase}_${startDate}_${endDate}`;
}

// Save one CSV file per plot
function savePlotCSV(data, measurement, sensors, ttns, startDate, endDate) {
  if (!data || data.length === 0) {
    alert(`No data for ${measurement}.`);
    return;
  }
  const formatted = formatDataForExportLongFormat(data, sensors, ttns);
  const csv = Papa.unparse(formatted);
  const filename = makeFileName(measurement, startDate, endDate);
  triggerCSVDownload(csv, filename);
}

// Save all results (all charts) into one CSV
function saveAllResults(allData, sensors, ttns, startDate, endDate) {
  if (!allData || allData.length === 0) {
    alert("No results to save.");
    return;
  }
  const formatted = formatDataForExportLongFormat(allData, sensors, ttns);
  const csv = Papa.unparse(formatted);
  const filename = makeFileName("All_selected_measurements", startDate, endDate);
  triggerCSVDownload(csv, filename);
}

function formatDataForExportLongFormat(influxData, sensors, ttns) {
  if (!influxData || influxData.length === 0) return [];

  // Map TTN name → Sensor name
  const ttnToSensorNames = {};
  ttns.forEach((ttn, i) => {
    ttnToSensorNames[ttn] = sensors[i] || ttn;
  });

  return influxData
    .map(row => {

      const sensorName = ttnToSensorNames[row._measurement] || row._measurement;
      const measurementName = row.measurementUI;
      const measurementValueRange = measurementLimits[measurementName];
      const unit = measurementUnits[measurementName] || '';

      const meta = csvData.find(
        r =>
          r['Sensor Name'] === sensorName && 
          r['Measurement'] === measurementToSmsMap[measurementName]
      );
      // ❗ skip rows without metadata
      if (!meta) return null;

      return {
        "Timestamp": row._time,
        "Site Name": meta['Site Name'] || '',
        "Sensor Name": sensorName,
        "Longitude": meta['Longitude'] || '',
        "Latitude": meta['Latitude'] || '',
        "Measurement": measurementName,
        "Measurement Value": row._value,
        "Measurement Min Value": measurementValueRange?.min ?? '',
        "Measurement Max Value": measurementValueRange?.max ?? '',
        "Measurement Unit": unit,
        "Out-of-Range Flag":
          (measurementValueRange?.min !== undefined &&
           measurementValueRange?.max !== undefined) &&
          (row._value < measurementValueRange?.min ||
           row._value > measurementValueRange?.max)
            ? 'Yes'
            : 'No'
      };
    })
    .filter(Boolean);   // removes null rows
}

// Helper to trigger download
function triggerCSVDownload(csv, filename) {
  const utf8BOM = "\uFEFF";
  const blob = new Blob([utf8BOM + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = `${filename}.csv`;

  document.body.appendChild(a);   // important for Firefox
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
}
