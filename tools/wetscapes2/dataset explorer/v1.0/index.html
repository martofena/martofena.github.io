<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="logo.png" type="image/png">
<title>WETSCAPES2.0 Dataset Explorer v1.0</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<!-- Leaflet Draw CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-draw@1.0.4/dist/leaflet.draw.css" />

<style>
  body, html {
    margin: 0;
    height: 100%;
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }
  #container {
    display: flex;
    height: 100%;
  }

/* ======================
   SIDEBAR
====================== */

  #sidebar {
    width: 320px;
    overflow-y: auto;
    background: #fafafa;
    padding: 10px;
    box-sizing: border-box;
    border-right: 1px solid #ccc;
  }

  .filter-buttons {
    display: flex;
    gap: 10px;          /* space between buttons */
    margin-top: 8px;
  }

  .filter-buttons label, input, button {
    flex: 1;            /* optional: makes them equal width */
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

/* ======================
   MAP
====================== */

  #map {
    flex-grow: 1;
  }

  input, button, select {
    width: 100%;
    margin: 4px 0 8px 0;
    padding: 6px;
    box-sizing: border-box;
    cursor: pointer;
  }

/* ======================
   LAYER LIST
====================== */

  #layer-panel {
    position: absolute;
    top: 80px;
    right: 20px;

    min-width: 220px;
    max-width: 320px;
    max-height: 80vh;

    overflow-y: auto;
    overflow-x: hidden;

    padding: 8px;

    font-family: system-ui, -apple-system, sans-serif;
    /*background: transparent;*/ /* transparent */
    background: rgba(255, 255, 255, 0.2); /* transparent white */
    border: none;
    box-shadow: none;
    backdrop-filter: blur(4px); /* optional but very nice */

  }

  .layer-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px;
    cursor: pointer;
    border-radius: 6px;
    opacity: 0.5;
    transition: opacity 0.2s ease;
  }

  .layer-item.active {
    opacity: 1;
  }

  .layer-item:hover {
    background: #f3f3f3;
  }

  .layer-icon {
    position: relative;
    width: 26px;
    height: 22px;
    transition: transform 0.15s ease;
  }

  .layer-item:hover .layer-icon {
    transform: scale(1.15);
  }

  .layer-icon span {
    position: absolute;
    width: 22px;
    height: 12px;
    left: 2px;
    border-radius: 2px;
    transform: skewY(-15deg);
  }

  .layer-icon span:nth-child(1) { top: 0; opacity: 0.9; }
  .layer-icon span:nth-child(2) { top: 4px; opacity: 0.75; }
  .layer-icon span:nth-child(3) { top: 8px; opacity: 0.6; }

  .layer-label {
    flex-grow: 1;
    font-size: 13px;
  }

  .layer-count {
    color: #666;
    font-size: 12px;
  }

  .layer-remove {
    color: #aaa;
    font-size: 14px;
    cursor: pointer;
  }

  .layer-remove:hover {
    color: red;
  }

  #status {
    font-size: 0.9em;
    color: #666;
    margin-bottom: 10px;
    min-height: 1.4em;
  }

  /* Scrollable Leaflet popups */
  .leaflet-popup-content {
    max-height: 220px;        /* adjust as needed */
    overflow-y: auto;
    overflow-x: hidden;
  }

  /* Optional: nicer scrollbar (Chrome / Edge) */
  .leaflet-popup-content::-webkit-scrollbar {
    width: 6px;
  }
  .leaflet-popup-content::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.3);
    border-radius: 4px;
  }

  .scrollable-popup .leaflet-popup-content {
    max-height: 220px;
    overflow-y: auto;
  }
</style>
</head>
<body>
<div id="container">

  <!-- ======================
       SIDEBAR
  ======================= -->
  
  <div id="sidebar">
    <div style="text-align:center;">
      <img src="logo.png" alt="WETSCAPES2.0 Logo"
           style="max-width:180px; height:auto;">
    </div>
    <h1 style="text-align: center;">Dataset Explorer</h1>
    <button id="loadBtn">Load CKAN Datasets</button>

    <h3>Site Filter</h3>

    <label>Site Name:</label>
    <input id="filterSite" type="text" />

    <div class="filter-buttons">
      <button id="applySiteFilterBtn">Apply Filter</button>
      <button id="removeSiteFilterBtn">Remove Filter</button>
    </div>

    <h3>Temporal Filter</h3>

    <div class="filter-buttons">
      <label for="temporalPreset">Preset:</label>
      <select id="temporalPreset">
        <option value="past_week">Past 1 week</option>
        <option value="past_month">Past 1 month</option>
        <option value="next_week">Next 1 week</option>
        <option value="next_month">Next 1 month</option>
        <option value="custom">Custom</option>
      </select>
    </div>

    <div class="filter-buttons" id="customDates" style="display:none;">
      <label>After Date:</label>
      <label>Before Date:</label>
    </div>

    <div class="filter-buttons" id="customInputs" style="display:none;">
      <input id="filterAfter" type="date" />
      <input id="filterBefore" type="date" />
    </div>

    <div class="filter-buttons">
      <button id="applyTemporalFilterBtn">Apply Filter</button>
      <button id="removeTemporalFilterBtn">Remove Filter</button>
    </div>

    <h3>Person Filter</h3>

    <label>Author/Maintainer Name:</label>
    <input id="filterPerson" type="text" />

    <div class="filter-buttons">
      <button id="applyPersonFilterBtn">Apply Filter</button>
      <button id="removePersonFilterBtn">Remove Filter</button>
    </div>

    <h3>User-defined Layer</h3>
    <label>Layer Name:</label>
    <input id="layerName" type="text" />
    <button id="addSelectedLayerBtn">Add Selected Layer</button>
 
  </div>

  <!-- ======================
       MAP
  ======================= -->

  <div id="map"></div>
  <div id="layer-panel" class="leaflet-control leaflet-bar"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Leaflet Draw -->
<script src="https://cdn.jsdelivr.net/npm/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<!-- Drag-n-Drop Layer Control -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<!-- Papa parse for CSVs -->
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<!-- JSZip -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.7.1/dist/jszip.min.js"></script>
<!-- FileSaver -->
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

<script>
(() => {
  // === Global constants and variables ===

  let datasets = [];
  let filteredDatasets = [];
  let layers = [];
  let layerMarkers = {};
  let map, drawControl, drawnItems, boundingBox;

  // DOM references
  const loadBtn = document.getElementById('loadBtn');

  const filterSiteNameInput = document.getElementById('filterSite');
  const applySiteFilterBtn = document.getElementById('applySiteFilterBtn');
  const removeSiteFilterBtn = document.getElementById('removeSiteFilterBtn');

  const temporalPresetSelect = document.getElementById('temporalPreset');
  const customDatesDiv = document.getElementById('customDates');
  const customInputsDiv = document.getElementById('customInputs');
  const filterAfterInput = document.getElementById('filterAfter');
  const filterBeforeInput = document.getElementById('filterBefore');

  const filterPersonInput = document.getElementById('filterPerson');
  const applyPersonFilterBtn = document.getElementById('applyPersonFilterBtn');
  const removePersonFilterBtn = document.getElementById('removePersonFilterBtn');

  const layerNameInput = document.getElementById('layerName');
  const addSelectedLayerBtn = document.getElementById('addSelectedLayerBtn');

  /* ==============================
     1. MAP INITIALIZATION
  =============================== */

  function initMap() {
    map = L.map('map').setView([54, 12], 8);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap contributors',
    }).addTo(map);

    drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    drawControl = new L.Control.Draw({
      draw: {
        polyline: false,
        polygon: false,
        circle: false,
        marker: false,
        circlemarker: false,
        rectangle: true,
      },
      edit: {
        featureGroup: drawnItems,
        remove: true,
      },
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function (event) {

      if (boundingBox) drawnItems.removeLayer(boundingBox);

      boundingBox = event.layer;
      drawnItems.addLayer(boundingBox);

      const bounds = boundingBox.getBounds();

      ckanFilteredPoints = ckanDataOrgPoints.filter(p =>
        bounds.contains([p.lat, p.lon])
      );

      renderCkanLayer(ckanFilteredPoints);
    });

    map.on(L.Draw.Event.EDITED, function (event) {

      event.layers.eachLayer(function (layer) {

        if (layer === boundingBox) {

          const bounds = boundingBox.getBounds();

          ckanFilteredPoints = ckanDataOrgPoints.filter(p =>
            bounds.contains([p.lat, p.lon])
          );

          renderCkanLayer(ckanFilteredPoints);
        }
      });
    });

    map.on(L.Draw.Event.DELETED, function () {
      boundingBox = null;
      ckanFilteredPoints = [...ckanDataOrgPoints];
      renderCkanLayer(ckanFilteredPoints);
    });
  }

  /* ==============================
     2. LOAD MAP ELEMENTS
     (Predefined Layers placeholder)
  =============================== */


  let overlayLayers = {}; // global to hold loaded layers

  /* =========================================================
      HELPERS
    ========================================================= */

  function addLayer(name, layer, combinedBounds, visible = true) {
    if (typeof name !== 'string' || name.trim() === '') {
      console.error('Invalid layer name:', name);
      return combinedBounds;
    }

    overlayLayers[name] = layer;

    if (visible) {
      layer.addTo(map);

      const b = layer.getBounds?.();
      if (b && b.isValid()) {
        combinedBounds = combinedBounds ? combinedBounds.extend(b) : b;
      }
    }

    return combinedBounds;
  }

  function popupAllProps(title) {
    return (feature, layer) => {
      let html = `<b>${title}</b><br>`;
      for (const [k, v] of Object.entries(feature.properties || {})) {
        html += `<b>${k}:</b> ${v}<br>`;
      }
      layer.bindPopup(html, {
        maxWidth: 300,
        className: 'scrollable-popup'
      });
    };
  }

  /* =========================================================
      LAYER CONTROL MENU
    ========================================================= */
  
  function getFeatureCount(layer) {
    let count = 0;
    layer.eachLayer(l => {
      if (l.feature) {count++;}
      else {count++;}
    });
    return count;
  }

  function toggleLayer(layer) {
      if (map.hasLayer(layer)) {
        map.removeLayer(layer);
      } else {
        map.addLayer(layer);
        enforceZOrder();
      }
    }

  function enforceZOrder() {
    const order = [
      'Screening Sites',
      'Candidate Sites',
      'Installed Configurations',
      'Parkings',
      'Paths',
      'Gateways',
      'Candidate Configurations'
    ];

    order.forEach(name => {
      const l = overlayLayers[name];
      if (l && map.hasLayer(l)) {
        l.bringToFront();
      }
    });
  }

  function createLayerItem({
    id = null,
    name,
    layer,
    color,
    removable = false,
    type = 'predefined' // NEW
  }) {

    const item = document.createElement('div');
    item.className = 'layer-item';

    if (id) {
      item.dataset.layerId = id; // assign ID to DOM
    }

    const icon = document.createElement('div');
    icon.className = 'layer-icon';
    icon.innerHTML = `
      <span style="background:${color}"></span>
      <span style="background:${color}"></span>
      <span style="background:${color}"></span>
    `;

    const label = document.createElement('div');
    label.className = 'layer-label';
    label.innerHTML = `
      ${name}
      <span class="layer-count">
        (${getFeatureCount(layer)})
      </span>
    `;

    const removeBtn = document.createElement('div');
    removeBtn.className = 'layer-remove';
    removeBtn.textContent = '✕';

    /* ============================= */
    /* 🔹 PREDEFINED LAYERS LOGIC */
    /* ============================= */
    if (type === 'predefined') {

      if (map.hasLayer(layer)) {
        item.classList.add('active');
      }

      item.addEventListener('click', () => {
        toggleLayer(layer);
        item.classList.toggle('active', map.hasLayer(layer));
      });

      removeBtn.style.visibility = 'hidden';
    }

    /* ============================= */
    /* 🔹 USER-DEFINED LAYERS LOGIC */
    /* ============================= */
    if (type === 'user') {

      const entry = userLayerRegistry.get(id);

      if (entry?.visible) {
        item.classList.add('active');
      }

      item.addEventListener('click', () => {

        const entry = userLayerRegistry.get(id);
        if (!entry) return;

        entry.visible = !entry.visible;
        saveUserLayersToStorage();
        updateExportButtonCounter();

        if (entry.visible) {
          map.addLayer(layer);
        } else {
          map.removeLayer(layer);
        }

        item.classList.toggle('active', entry.visible);
      });

      if (removable) {
        removeBtn.addEventListener('click', e => {
          e.stopPropagation();

          const entry = userLayerRegistry.get(id);
          if (!entry) return;

          if (entry.visible) {
            map.removeLayer(layer);
          }

          userDefinedLists[entry.index] = null;
          userLayerRegistry.delete(id);

          saveUserLayersToStorage();
          updateExportButtonCounter();
          item.remove();
        });
      } else {
        removeBtn.style.visibility = 'hidden';
      }
    }

    item.append(icon, label, removeBtn);
    return item;
  }

  /* =========================================================
      LOAD LAYERS AND MENU
    ========================================================= */

  async function loadPredefinedLayers() {
    try {
      const res = await fetch('layers/predefined_layers.json');
      if (!res.ok) throw new Error(`Failed to load predefined_layers.json: ${res.statusText}`);
      const layerDefs = await res.json();

      const configColorsById = {};
      let combinedBounds = null;
      overlayLayers = {};
      const LAYER_ORDER = [
        'screening_sites',
        'candidate_sites',
        'installed_configurations',
        'parkings',
        'paths',
        'gateways',
        'candidate_configurations'
      ];
      const paneIndex = {};
      LAYER_ORDER.forEach((id, i) => {
        const pane = map.createPane(id);
        pane.style.zIndex = 400 + i * 10; // large gaps = future-proof
        paneIndex[id] = pane;
      });

      /* =========================================================
         1) SCREENING SITES (MultiPolygon)
         ========================================================= */
      for (const def of layerDefs) {
        if (def.name.toLowerCase() === 'screening sites') {

          const res = await fetch(def.file);
          if (!res.ok) {
            console.warn(`Skipping ${def.name}: ${res.statusText}`);
            continue;
          }
          const geojson = await res.json();

          if (!geojson.features || geojson.features.length === 0) {
            console.warn(`No features in ${def.name}`);
          }
          
          const layer = L.geoJSON(geojson, {
            pane: 'screening_sites',
            style: {
              color: def.color,
              weight: 2,
              fillOpacity: 0.35,
            },
            onEachFeature: popupAllProps(def.name)
          });

          combinedBounds = addLayer(def.name, layer, combinedBounds, true);
        }
      }

      /* =========================================================
         2) CANDIDATE SEGMENTS (MultiPolygon)
         ========================================================= */
      for (const def of layerDefs) {
        if (def.name.toLowerCase() === 'candidate sites') {

          const res = await fetch(def.file);
          if (!res.ok) {
            console.warn(`Skipping ${def.name}: ${res.statusText}`);
            continue;
          }
          const geojson = await res.json();

          if (!geojson.features || geojson.features.length === 0) {
            console.warn(`No features in ${def.name}`);
          }

          const layer = L.geoJSON(geojson, {
              pane: 'candidate_sites',
              style: {
              color: def.color,
              weight: 2,
              fillOpacity: 0.4,
            },
            onEachFeature: popupAllProps(def.name)
          });

          combinedBounds = addLayer(def.name, layer, combinedBounds, false);
        }
      }

      /* =========================================================
         3) INSTALLED SCREENING SITE CONFIGURATIONS (Point)
         ========================================================= */
      for (const def of layerDefs) {
        if (def.name.toLowerCase() === 'installed configurations') {

          const res = await fetch(def.file);
          if (!res.ok) {
            console.warn(`Skipping ${def.name}: ${res.statusText}`);
            continue;
          }
          const geojson = await res.json();

          if (!geojson.features || geojson.features.length === 0) {
            console.warn(`No features in ${def.name}`);
          }

          geojson.features.forEach(f => {
            if (f.properties?.ID) {
              configColorsById[f.properties.ID] = def.color;
            }
          });

          const layer = L.geoJSON(geojson, {
            pane: 'installed_configurations',
            pointToLayer: (_, latlng) =>
              L.circleMarker(latlng, {
                pane: 'installed_configurations',
                radius: 6,
                fillColor: def.color,
                color: '#000',
                weight: 1,
                fillOpacity: 0.8,
              }),
            onEachFeature: popupAllProps(def.name)
          });

          combinedBounds = addLayer(def.name, layer, combinedBounds, true);
        }
      }

      /* =========================================================
         4) PARKINGS (Point → icon)
         ========================================================= */
      for (const def of layerDefs) {
        if (def.name.toLowerCase() === 'parkings') {

          const res = await fetch(def.file);
          if (!res.ok) {
            console.warn(`Skipping ${def.name}: ${res.statusText}`);
            continue;
          }
          const geojson = await res.json();

          if (!geojson.features || geojson.features.length === 0) {
            console.warn(`No features in ${def.name}`);
          }
            // Define a parking icon (you can customize the URL or use any icon)
          const parkingIcon = L.icon({
            pane: 'parkings',
            iconUrl: 'layers/parking_icon.png', // Parking icon relative path
            iconSize: [12, 12], // size of the icon
            iconAnchor: [12, 12], // point of the icon which will correspond to marker's location
            popupAnchor: [0, -12], // point from which the popup should open relative to the iconAnchor
          });
          const layer = L.geoJSON(geojson, {
            pointToLayer: (_, latlng) =>
              L.marker(latlng, { icon: parkingIcon }),
            onEachFeature: popupAllProps(def.name)
          });

          combinedBounds = addLayer(def.name, layer, combinedBounds, true);
        }
      }

      /* =========================================================
         5) PATHS TO CONFIGURATIONS (MultiLineString)
         ========================================================= */
      for (const def of layerDefs) {
        if (def.name.toLowerCase() === 'paths') {

          const res = await fetch(def.file);
          if (!res.ok) {
            console.warn(`Skipping ${def.name}: ${res.statusText}`);
            continue;
          }
          const geojson = await res.json();

          if (!geojson.features || geojson.features.length === 0) {
            console.warn(`No features in ${def.name}`);
          }
          
          const layer = L.geoJSON(geojson, {
            pane: 'paths',
            style: (feature) => {
              const configId =
                feature.properties?.Route_to_point ||
                feature.properties?.ID;

              return {
                color: configColorsById[configId] || def.color || '#000',
                weight: 3,
                dashArray: '10,6',
                opacity: 0.8,
              };
            },
            onEachFeature: popupAllProps(def.name)
          });

          combinedBounds = addLayer(def.name, layer, combinedBounds, true);
        }
      }

      /* =========================================================
         6) GATEWAYS (Point → red circles)
         ========================================================= */
      for (const def of layerDefs) {
        if (def.name.toLowerCase() === 'gateways') {

          const res = await fetch(def.file);
          if (!res.ok) {
            console.warn(`Skipping ${def.name}: ${res.statusText}`);
            continue;
          }
          const geojson = await res.json();

          if (!geojson.features || geojson.features.length === 0) {
            console.warn(`No features in ${def.name}`);
          }
          
          const layer = L.geoJSON(geojson, {
            pane: 'gateways',
            pointToLayer: (_, latlng) =>
              L.circleMarker(latlng, {
                pane: 'gateways',
                radius: 6,
                fillColor: def.color,
                color: '#000',
                weight: 1,
                fillOpacity: 0.9,
              }),
            onEachFeature: popupAllProps(def.name)
          });

          combinedBounds = addLayer(def.name, layer, combinedBounds, true);
        }
      }

      /* =========================================================
         7) CANDIDATE CONFIGURATIONS (MultiPoint)
         ========================================================= */
      for (const def of layerDefs) {
        if (def.name.toLowerCase() === 'candidate configurations') {

          const res = await fetch(def.file);
          if (!res.ok) {
            console.warn(`Skipping ${def.name}: ${res.statusText}`);
            continue;
          }
          const geojson = await res.json();

          if (!geojson.features || geojson.features.length === 0) {
            console.warn(`No features in ${def.name}`);
          }

          const layer = L.geoJSON(geojson, {
            pane: 'candidate_configurations',
            pointToLayer: (_, latlng) =>
              L.circleMarker(latlng, {
                pane: 'candidate_configurations',
                radius: 6,
                fillColor: def.color,
                color: '#000',
                weight: 1,
                fillOpacity: 0.85,
              }),
            onEachFeature: popupAllProps(def.name)
          });

          combinedBounds = addLayer(def.name, layer, combinedBounds, false);
        }
      }

      /* =========================================================
         LAYER CONTROL + FIT
         ========================================================= */
 
      if (combinedBounds) {
        map.fitBounds(combinedBounds);
      }
      
      const panel = document.getElementById('layer-panel');
      panel.innerHTML = '';

      /* predefined layers */
      for (const def of layerDefs) {

        const layer = overlayLayers[def.name];
        if (!layer) continue;

        const isCandidate = def.name.toLowerCase().includes('candidate');

        const predefinedId = `predef-${crypto.randomUUID()}`;

        const item = createLayerItem({
          id: predefinedId,
          name: def.name,
          layer,
          color: def.color || '#777',
          removable: false,
          type: 'predefined' // IMPORTANT
        });

        panel.appendChild(item);

        /* hide candidates initially */
        if (isCandidate) {
          map.removeLayer(layer);
          item.classList.remove('active');
        }
      }
      initLayerExportButton();

    } catch (err) {
      console.error('Error loading predefined layers:', err);
    }
  }

  /* ==============================
     3. CKAN FUNCTIONALITY
  =============================== */

  const CKAN_PROXY = 'http://localhost:8001/api/ckan';
  const CKAN_BASE = 'https://ckan.fdm.uni-greifswald.de';
  const CKAN_API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJfWGJkNTJvdDgyMXFCVUl6ZXN1MzRrMzViRlZudXdEZlJ2eU5OcWJQNXFjIiwiaWF0IjoxNzcwNDcyOTQ5fQ.rlcQ5Q46kLps6T8zqYofX46A-aAenIid_e5LWg3UZQQ";
  const ckanOrgName = 'transregio410';
  const ckanOrgTitle = 'WETSCAPES 2.0';

  let ckanDatasetsLoaded = false;
  let ckanBaseLayer = L.layerGroup();
  let ckanDataOrgPoints = []; // raw data objects
  let ckanSiteFilteredPoints = [];
  let ckanTempFilteredPoints = [];
  let ckanPersonFilteredPoints = [];
  let ckanFilteredPoints = [];
  let siteFilterFlag = false;
  let tempFilterFlag = false;
  let personFilterFlag = false;

  async function ckanFetch(action, params = {}) {
    const qs = new URLSearchParams(params).toString();
    const url = `${CKAN_BASE}/api/3/action/${action}?${qs}`;
  
    const res = await fetch(url, {
      method: "GET",
      headers: {
        "Authorization": CKAN_API_KEY,
        "Accept": "application/json"
      }
    });
  
    const json = await res.json();
  
    if (!json.success) {
      throw new Error(json.error?.message || "CKAN error");
    }
  
    return json.result;
  }
  async function collectDatasetObjects(dataset) {

    const datasetUrl = `${CKAN_BASE}/dataset/${dataset.name}`;

    for (const resource of dataset.resources || []) {

      if (!resource.description) continue;

      const desc = resource.description;

      // ---------- Helper to extract section ----------
      function extractSection(title) {
        const regex = new RegExp(
          `#\\s*${title}\\s*[\\r\\n]+([\\s\\S]*?)(?=\\n#\\s*|$)`,
          'i'
        );
        const match = desc.match(regex);
        return match ? match[1].trim() : null;
      }

      // ---------- Extract sections ----------
      const generalInfo   = extractSection('GENERAL DETAILS');
      const siteRaw       = extractSection('SITE DETAILS');
      const timeRangeRaw  = extractSection('TIME RANGE');
      const dataFeatures  = extractSection('DATA FEATURES');
      const measurementsRaw = extractSection('MEASUREMENT FEATURES');

      if (!measurementsRaw) continue;

      // ---------- Parse TIME RANGE ----------
      let startTime = null;
      let endTime   = null;

      if (timeRangeRaw) {
        const startMatch = timeRangeRaw.match(/Start Time:\s*(.+)/i);
        const endMatch   = timeRangeRaw.match(/End Time:\s*(.+)/i);

        if (startMatch) startTime = new Date(startMatch[1].trim());
        if (endMatch)   endTime   = new Date(endMatch[1].trim());
      }

      // ---------- Parse SITE ----------
      let siteName = null;

      if (siteRaw) {
        const siteParts = siteRaw.split(',').map(s => s.trim());
        siteName = siteParts[0] || null;
      }

      // ---------- Parse MEASUREMENTS ----------
      const lines = measurementsRaw
        .split(/\r?\n/)
        .map(l => l.trim())
        .filter(l => l.length > 0);

      for (const line of lines) {

        const parts = line.split(',').map(p => p.trim());

        // Expected:
        // name, lon, lat, dist, height
        if (parts.length < 3) continue;
        const name = parts[0];
        const lon  = parseFloat(parts[1]);
        const lat  = parseFloat(parts[2]);
        const dist  = parseFloat(parts[3]);
        const height  = parseFloat(parts[4]);

        if (isNaN(lat) || isNaN(lon)) continue;

        ckanDataOrgPoints.push({
          generalInfo,
          dataFeatures,
          siteName,
          startTime,
          endTime,
          measurementName: name,
          lat,
          lon,
          dist,
          height,
          dataset,
          resource,
          datasetUrl
        });
      }
    }
  }

  function renderCkanLayer(points) {

    ckanBaseLayer.clearLayers();
    
    const today = new Date();
    today.setHours(0,0,0,0); // compare only dates

    points.forEach(p => {

      // choose color
      const isFuture = p.startTime && p.startTime > today;
      const markerColor = isFuture ? futureDataColor : dataColor;

      const marker = L.circleMarker([p.lat, p.lon], {
        pane: dataPane,
        radius: 9,
        fillColor: markerColor,
        color: '#000',

      attachMarkerInteraction(marker,markerColor);

      ckanBaseLayer.addLayer(marker);
    });

    ckanBaseLayer.addTo(map);

    const packageSearchResult = await ckanFetch('package_search', {
      fq: `organization:${ckanOrgName}`,
      include_private: true,
      rows: 1000
    });

    const allDatasets = packageSearchResult.results || [];

    // Filter by organization name AND title
    const orgDatasets = allDatasets.filter(ds =>
      ds.organization &&
      ds.organization.name === ckanOrgName &&
      ds.organization.title === ckanOrgTitle

  const PROJECT_START = new Date('2025-04-01');
  const PROJECT_END   = new Date('2028-12-31');

  function updateFilteredPoints() {

    if (ckanDataOrgPoints.length === 0) return;

    let points = [...ckanDataOrgPoints];

    // --- Temporal Filter ---
    if (tempFilterFlag) {
      let selStart, selEnd;
      const today = new Date();
      const preset = temporalPresetSelect.value;

      switch(preset) {

        case 'past_week':
          selStart = new Date(today);
          selStart.setDate(selStart.getDate() - 7);
          selEnd = new Date(today);
          break;

        case 'past_month':
          selStart = new Date(today);
          selStart.setMonth(selStart.getMonth() - 1);
          selEnd = new Date(today);
          break;

        case 'next_week':
          selStart = new Date(today);
          selEnd = new Date(today);
          selEnd.setDate(selEnd.getDate() + 7);
          break;

        case 'next_month':
          selStart = new Date(today);
          selEnd = new Date(today);
          selEnd.setMonth(selEnd.getMonth() + 1);
          break;

        case 'custom':
          selStart = filterAfterInput.value ? new Date(filterAfterInput.value) : new Date(PROJECT_START);
          selEnd   = filterBeforeInput.value ? new Date(filterBeforeInput.value) : new Date(PROJECT_END);
          break;

        default:
          selStart = new Date(PROJECT_START);
          selEnd   = new Date(PROJECT_END);
      }

      if (selStart < PROJECT_START) selStart = new Date(PROJECT_START);
      if (selEnd > PROJECT_END) selEnd = new Date(PROJECT_END);

      if (selEnd < selStart) {
        alert("End date cannot be before Start date.");
        return;
      }

      // convert to UTC day boundaries
      selStart = new Date(Date.UTC(
        selStart.getFullYear(),
        selStart.getMonth(),
        selStart.getDate(),
        0,0,0,0
      ));

      selEnd = new Date(Date.UTC(
        selEnd.getFullYear(),
        selEnd.getMonth(),
        selEnd.getDate(),
        23,59,59,999
      ));

      points = points.filter(p => {

        const start = p.startTime;
        const end   = p.endTime;

        if (!start && !end) return true;

        if (start && end) {
          return start <= selEnd && end >= selStart;
        }

        if (start && !end) {
          return start <= selEnd;
        }

        if (!start && end) {
          return end >= selStart;
        }

        return true;

      });

    }

    // --- Site Filter ---
    if (siteFilterFlag) {

      const nameFilter = filterSiteNameInput.value.toLowerCase();

      points = points.filter(p =>
        (p.siteName || '').toLowerCase().includes(nameFilter)
      );

    }

    // --- Person Filter ---
    if (personFilterFlag) {

      const personFilter = filterPersonInput.value.toLowerCase();

      points = points.filter(p =>
        ((p.dataset?.author || '').toLowerCase().includes(personFilter)) ||
        ((p.dataset?.maintainer || '').toLowerCase().includes(personFilter))
      );

    }

    ckanFilteredPoints = points;

    renderCkanLayer(ckanFilteredPoints);

    if (ckanFilteredPoints.length === 0) {
      alert("There are no matching resource points for the selected filters.");
    }

    // --- Buttons ---
    applyTemporalFilterBtn.disabled = tempFilterFlag;
    removeTemporalFilterBtn.disabled = !tempFilterFlag;

    applySiteFilterBtn.disabled = siteFilterFlag;
    removeSiteFilterBtn.disabled = !siteFilterFlag;

    applyPersonFilterBtn.disabled = personFilterFlag;
    removePersonFilterBtn.disabled = !personFilterFlag;

  }

  // 1000 empty storage slots
  const userDefinedLists = Array.from({ length: 1000 }, () => null);

  // registry by unique layer id
  const userLayerRegistry = new Map();

  function getRandomColor() {
    const excluded = ['#33a02c', '#ff0000', '#1f78b4', '#e07941'];

    let color;
    do {
      color =
        '#' +
        Math.floor(Math.random() * 16777215)
          .toString(16)
          .padStart(6, '0');
    } while (excluded.includes(color.toLowerCase()));

    return color;
  }

  function addSelectedLayer() {

    if (!ckanFilteredPoints.length) {
      alert("No matching points.");
      return;
    }

    const name = layerNameInput.value?.trim();
    if (!name) {
      alert("Please insert a layer name!");
      return;
    }

    const index = userDefinedLists.findIndex(l => l === null);
    if (index === -1) {
      alert("Maximum number of user layers reached.");
      return;
    }

    const layerId = crypto.randomUUID();
    const color = getRandomColor();

    // store copy
    userDefinedLists[index] = [...ckanFilteredPoints];

    const group = L.layerGroup();

    // Pre-build markers
    userDefinedLists[index].forEach(p => {
      const marker = L.circleMarker([p.lat, p.lon], {
        pane: dataPane,
        radius: 7,
        fillColor: color,
        color: '#000',
        weight: 1,
        fillOpacity: 0.9
      });

      marker.bindPopup(buildCkanPopup(p));
      group.addLayer(marker);
    });

    userLayerRegistry.set(layerId, {
      index,
      layerGroup: group,
      color,
      visible: false,
      name
    });

    document.getElementById('layer-panel').appendChild(
      createLayerItem({
        id: layerId,
        name,
        layer: group,
        color,
        removable: true,
        type: 'user'
      })
    );

    layerNameInput.value = '';
    addSelectedLayerBtn.disabled = true;

    updateExportButtonCounter();
    saveUserLayersToStorage();
  }

        const resource = p.resource || {};

        const datasetUrl = dataset.id
          ? `https://ckan.wetscapes2.0.de/dataset/${dataset.id}`
          : '';

        const row = [
          esc(dataset.title),
          esc(dataset.notes || '–'),
          esc(dataset.author || '–'),
          esc(dataset.maintainer || '–'),
          esc(dataset.maintainer_email || '–'),
          esc(datasetUrl),
          esc(resource.name),
          esc(p.generalInfo || '–'),
          esc(p.siteName || '–'),
          esc(p.startTime ? p.startTime.toISOString() : ''),
          esc(p.endTime ? p.endTime.toISOString() : ''),
          esc(p.dataFeatures || '–'),
          esc(p.measurementName),
          p.lon ?? '',
          p.lat ?? '',
          esc(p.height || '–'),
          esc(p.depth || p.height || '–'),
          esc(p.dist || '–'),
          esc(resource.url)
        ];

        csv.push(row.join(","));
      });

    });

    const csvContent = csv.join("\n");

    const blob = new Blob(["\uFEFF" + csvContent], {
      type: "text/csv;charset=utf-8;"
    });

    saveAs(blob, fileName);
  }

  /* ==============================
     6. HANDLE PAGE RE-LOAD
  =============================== */

  function saveUserLayersToStorage() {

    const layersToSave = [];

    userLayerRegistry.forEach(entry => {
      layersToSave.push({
        name: entry.name,
        color: entry.color,
        visible: entry.visible,
        data: userDefinedLists[entry.index]  // your point data
      });
    });

    localStorage.setItem(
      "wetscapes_user_layers",
      JSON.stringify(layersToSave)
    );
  }

  function restoreUserLayersFromStorage() {

    const stored = localStorage.getItem("wetscapes_user_layers");
    if (!stored) return;

    const layers = JSON.parse(stored);

    layers.forEach(layerData => {

      // recreate internal list
      const newIndex = userDefinedLists.length;
      userDefinedLists.push(layerData.data);

      // recreate Leaflet layer
      const layerGroup = L.layerGroup();

      layerData.data.forEach(p => {
        const marker = L.circleMarker([p.lat, p.lon], {
          radius: 5,
          color: layerData.color,
          fillOpacity: 0.8
        });
        layerGroup.addLayer(marker);
      });

      if (layerData.visible) {
        layerGroup.addTo(map);
      }

      userLayerRegistry.set(layerData.name, {
        name: layerData.name,
        index: newIndex,
        color: layerData.color,
        visible: layerData.visible,
        layer: layerGroup
      });

          // 🔥 USE YOUR EXISTING FUNCTION
      createLayerItem({
        id: layerData.name,
        name: layerData.name,
        layer: layerGroup,
        color: layerData.color,
        removable: true,
        type: 'user'
      });

    });

    updateExportButtonCounter();
  }

  /* ==============================
     INITIALIZATION
  =============================== */

  initMap();
  loadPredefinedLayers();
  //restoreUserLayersFromStorage();

  /* ==============================
     EVENT LISTENERS
  =============================== */

  loadBtn.addEventListener('click', async () => {
    if (ckanDatasetsLoaded) {
      alert('CKAN datasets are already loaded.');
      return;
    }
    loadBtn.disabled = true;
    loadBtn.textContent = 'Loading datasets…';

    try {
      ckanBaseLayer.clearLayers();
      await loadCkanOrganizationDatasets();
      ckanDatasetsLoaded = true;
    } catch (err) {
      console.error(err);
      alert(err.message);
      alert('Failed to load CKAN datasets');
    } finally {
      loadBtn.disabled = false;
      loadBtn.textContent = 'Load CKAN datasets';
    }
  });

  filterSiteNameInput.value = '';
  applySiteFilterBtn.disabled = true;
  applySiteFilterBtn.onclick = applySiteFilter;
  removeSiteFilterBtn.disabled = true;
  removeSiteFilterBtn.onclick = removeSiteFilter;
  filterSiteNameInput.addEventListener('input', updateSiteApplyState);
  function updateSiteApplyState() {
    applySiteFilterBtn.disabled = filterSiteNameInput.value.trim() === '';
  }

  // Reset inputs and buttons
  filterAfterInput.value = '';
  filterBeforeInput.value = '';
  temporalPresetSelect.value = ''; // default: no preset selected

  applyTemporalFilterBtn.disabled = true;
  applyTemporalFilterBtn.onclick = applyTemporalFilter;

  removeTemporalFilterBtn.disabled = true;
  removeTemporalFilterBtn.onclick = removeTemporalFilter;

  // Event listeners for custom After/Before inputs
  filterAfterInput.addEventListener('change', updateTemporalApplyState);
  filterBeforeInput.addEventListener('change', updateTemporalApplyState);

  // Event listener for preset selection
  temporalPresetSelect.addEventListener('change', () => {
    if (temporalPresetSelect.value === 'custom') {
      customDatesDiv.style.display = 'flex';
      customInputsDiv.style.display = 'flex';
    } else {
      customDatesDiv.style.display = 'none';
      customInputsDiv.style.display = 'none';
      filterAfterInput.value = '';
      filterBeforeInput.value = '';
    }
    updateTemporalApplyState();
  });

  // Update Apply button enabled state
  function updateTemporalApplyState() {
    let hasValue = false;
    if (temporalPresetSelect.value === 'custom') {
      hasValue = filterAfterInput.value || filterBeforeInput.value;
    } else {
      hasValue = temporalPresetSelect.value && temporalPresetSelect.value !== '';
    }
    applyTemporalFilterBtn.disabled = !hasValue;
  }

  filterPersonInput.value = '';
  applyPersonFilterBtn.disabled = true;
  applyPersonFilterBtn.onclick = applyPersonFilter;
  removePersonFilterBtn.disabled = true;
  removePersonFilterBtn.onclick = removePersonFilter; 
  filterPersonInput.addEventListener('input', updatePersonApplyState);
  function updatePersonApplyState() {
    applyPersonFilterBtn.disabled = filterPersonInput.value.trim() === '';
  }

  layerNameInput.value = '';
  addSelectedLayerBtn.disabled = true;
  addSelectedLayerBtn.onclick = addSelectedLayer;
  layerNameInput.addEventListener('input', updateFilterAddState);
  function updateFilterAddState() {
    addSelectedLayerBtn.disabled = layerNameInput.value.trim() === '';
  }

})();
</script>
</body>
