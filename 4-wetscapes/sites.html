<!DOCTYPE HTML>
<html>
<head>
<style>
body {
    font-family: 'Nunito', 'Open Sans', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
    margin: 0;
}
.page-container {
    width: 90%;
    margin: 20px auto;
    padding: 0 20px;
}

/* outer row: two columns */
.row {
    display: flex;
    margin-bottom: 20px;
}

/* each column: header + image vertically */
.column {
    flex: 1;
    display: flex;
    flex-direction: column;  /* stack header and image vertically */
    align-items: center;     /* center content horizontally */
    padding: 0 10px;
}

.column img {
    width: 100%;
    height: 300px;
    object-fit: contain;     /* keep aspect ratio */
    margin-top: 10px;       /* space between header and image */
}

.column h3 {
    text-align: center;
    margin: 0;
}
</style>
</head>
<body>
<div class="page-container">

  <div class="row">
      <div class="column">
          <h3>Site Categories</h3>
          <img src="images/sites/rss.png" alt="Site Categories">
      </div>

      <div class="column">
          <h3>Target Sites</h3>
          <img src="images/sites/rss2.png" alt="Target Sites">
      </div>
  </div>

</div>
</body>
</html>
