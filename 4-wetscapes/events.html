<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tools</title>

<style>
body {
    font-family: 'Nunito', 'Open Sans', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
    margin: 0;
}

/* Tab navigation styled like main navbar */
.tab-nav {
    display: flex;
    justify-content: center;
    background-color: darkgreen;
}

.tab-nav div {
    color: white;
    padding: 12px 25px;
    cursor: pointer;
    font-size: 18px;
}

.tab-nav div:hover {
    background-color: green;
}

.tab-nav .active {
    background-color: green;
}

/* Tab content */
.tab-content {
    display: none;   /* 🔴 hide everything by default */
    width: 90%;
    margin: 10px auto;
    padding: 0 20px;
}

.tab-content.active {
    display: block;  /* 🟢 only active tab is visible */
}

/* Event container */
.event-container {
    display: flex;
    border: 1px solid #ccc;
    margin-bottom: 5px;
    align-items: center;     /* center content horizontally */
}

.event-image {
    width: 20%;
    padding: 10px;
}

.event-image img {
    width: 100%;
    height:100px;
}

.event-info {
    width: 80%;
    padding: 10px; 
}
</style>
</head>

<body>
<!-- Tab Navigation -->
<div class="tab-nav">
    <div class="tab-link active" onclick="openTab('future')">
        Future Events
    </div>
     <div class="tab-link" onclick="openTab('past')">
        Past Events
    </div>
</div>

<!-- Upcoming Events -->
<div id="future" class="tab-content active">

    <div class="event-container">
        <div class="event-image">
            <img src="images/events/event1.png">
        </div>
        <div class="event-info">
            <p style="text-align: justify;"><b>Short description:</b> dfdsf</p>
            <p style="text-align: justify;"><b>Date:</b> sfdfds</p>
            <p>
                <b>Link:</b>
                <a href="events/event1.html" target="_blank">
                    Open Event Page
                </a>
            </p>
        </div>
    </div>

</div>

<!-- Existing Applications -->
<div id="past" class="tab-content">

    <div class="event-container">
        <div class="event-image">
            <img src="images/events/event1.png">
        </div>
        <div class="event-info">
            <p style="text-align: justify;"><b>Short description:</b> ADDDDD</p>
            <p style="text-align: justify;"><b>Date:</b> sfdfds</p>
            <p>
                <b>Link:</b>
                <a href="events/event1.html" target="_blank">
                    Open Event Page
                </a>
            </p>
        </div>
    </div>

</div>

<script>
function openTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-link').forEach(el => el.classList.remove('active'));

    document.getElementById(tabName).classList.add('active');
    event.target.classList.add('active');
}
</script>

</body>
</html>
